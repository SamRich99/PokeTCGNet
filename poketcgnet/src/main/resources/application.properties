spring.application.name=poketcgnet

spring.mongodb.uri=mongodb://localhost:27017/poketcgnet

spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=poketcgnet

# dimensione pagina per schermata (endpoint /page/{n} delle collezioni grandi)
app.pagination.trainers=25
app.pagination.gyms=25
app.pagination.tournaments=20
app.pagination.decks=20
app.pagination.cards=24

app.jwt.secret=MyVeryLongAndSecureJwtSecretKeyThatMustBeAtLeast32Characters
#token duration: 24h
app.jwt.expirationMs=86400000
